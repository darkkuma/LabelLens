<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#145c43" />
    <title>라벨렌즈 | 식품 라벨을 한눈에</title>
    <meta
      name="description"
      content="가공식품의 영양, 첨가물, 원산지를 같은 종류의 제품끼리 한눈에 비교합니다."
    />
    <link rel="stylesheet" href="./styles.css?v=20260721-7" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#top" aria-label="라벨렌즈 홈">
        <span class="brand-mark" aria-hidden="true">ㄹ</span>
        <span>라벨렌즈 <small>LabelLens</small></span>
      </a>
      <nav class="topnav" aria-label="주요 메뉴">
        <a href="#rankings">품목 랭킹</a>
        <a href="#label-title">라벨 분석</a>
        <a href="#ingredient-guide-title">성분 사전</a>
      </nav>
    </header>

    <main id="top">
      <section class="search-area" aria-labelledby="page-title">
        <form class="search-panel" id="search-form">
          <p class="section-kicker">가공식품 비교 랭킹</p>
          <h1 id="page-title">마트에서 덜 걱정되는 제품 찾기</h1>
          <p class="search-intro">만두, 소시지, 라면처럼 자주 사는 제품을 같은 품목끼리 비교하세요.</p>
          <div class="search-row">
            <input
              id="search-input"
              name="search"
              aria-label="제품명 또는 식품 종류"
              value=""
              autocomplete="off"
              placeholder="제품명 또는 품목 검색"
            />
            <button type="submit">찾기</button>
          </div>
          <div class="quick-picks" aria-label="추천 검색어">
            <span>바로 보기</span>
            <button type="button" data-query="냉동만두">만두</button>
            <button type="button" data-query="햄·소시지">햄·소시지</button>
            <button type="button" data-query="치킨너겟">치킨너겟</button>
            <button type="button" data-query="라면">라면</button>
          </div>
          <div class="category-picks" id="category-picks" aria-label="품목별 보기"></div>
          <p class="search-status" id="search-status" aria-live="polite">제품 데이터를 준비했어요</p>
        </form>
      </section>

      <section class="preference-bar" id="rankings" aria-labelledby="preference-title">
        <div>
          <span class="section-kicker">내 기준</span>
          <h2 id="preference-title">어떤 기준으로 순위를 볼까요?</h2>
        </div>
        <div class="preference-options" id="preference-options">
          <button type="button" class="preference-toggle active" data-preference="balanced" aria-pressed="true">종합 추천</button>
          <button type="button" class="preference-toggle" data-preference="sodium" aria-pressed="false">나트륨 적게</button>
          <button type="button" class="preference-toggle" data-preference="origin" aria-pressed="false">중국산 표시 적게</button>
          <button type="button" class="preference-toggle" data-preference="additives" aria-pressed="false">주의 성분 적게</button>
        </div>
      </section>

      <section class="workspace">
        <aside class="results-panel" aria-labelledby="results-title">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">품목별 추천</p>
              <h2 id="results-title">냉동만두 랭킹</h2>
            </div>
            <span id="result-count">0</span>
          </div>
          <div id="results-list" class="results-list"></div>
        </aside>

        <section class="detail-panel" aria-live="polite">
          <div id="product-detail"></div>
        </section>
      </section>

      <section class="label-tools" aria-labelledby="label-title">
        <div class="label-heading">
          <div>
            <p class="section-kicker">제품이 검색되지 않나요?</p>
            <h2 id="label-title">라벨 직접 분석</h2>
            <p>포장지의 원재료명과 영양정보를 붙여 넣으면 바로 읽어드려요.</p>
          </div>
          <span class="beta-label">BETA</span>
        </div>
        <div class="label-grid">
          <div class="input-group">
            <label for="label-input">원재료명 또는 영양정보</label>
            <textarea id="label-input" spellcheck="false">원재료명: 돼지고기(국산), 부추(중국산), 양배추(국산), 두부, 대두단백, 양조간장, 향미증진제, 산도조절제, 혼합제제, 참기름. 영양정보: 나트륨 760mg, 탄수화물 38g, 당류 5g, 지방 12g, 포화지방 4g, 단백질 13g.</textarea>
            <p>입력 내용은 브라우저 안에서만 분석됩니다.</p>
          </div>
          <div class="label-analysis" id="label-analysis"></div>
        </div>
      </section>

      <section class="ingredient-guide" aria-labelledby="ingredient-guide-title">
        <div class="guide-heading">
          <div>
            <p class="section-kicker">성분 플래그 사전</p>
            <h2 id="ingredient-guide-title">라벨에서 확인할 성분</h2>
          </div>
          <div class="guide-filters" id="guide-filters" aria-label="성분 플래그 필터"></div>
        </div>
        <div class="guide-list" id="ingredient-guide-list"></div>
      </section>
    </main>

    <footer><strong>라벨렌즈</strong></footer>

    <script src="./data/additives.js?v=20260721-7"></script>
    <script src="./data/product-images.js?v=20260721-7"></script>
    <script src="./data/products.js?v=20260721-7"></script>
    <script src="./data/catalog.js?v=20260721-7"></script>
    <script src="./config.js?v=20260721-7"></script>
    <script src="./app.js?v=20260721-7"></script>
  </body>
</html>
